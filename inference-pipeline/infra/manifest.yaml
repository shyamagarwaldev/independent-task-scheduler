apiVersion: v1
kind: Namespace
metadata:
  name: inference-pipeline
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-pipeline
  namespace: inference-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-pipeline
  template:
    metadata:
      labels:
        app: inference-pipeline
    spec:
      containers:
        - name: inference-pipeline
          image: shyamagarwaldev/inference-pipeline:v1
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          ports:
            - containerPort: 8000
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
---
apiVersion: v1
kind: Service
metadata:
  name: inference-pipeline
  namespace: inference-pipeline
spec:
  type: ClusterIP
  selector:
    app: inference-pipeline
  ports:
    - port: 8000
      targetPort: 8000
